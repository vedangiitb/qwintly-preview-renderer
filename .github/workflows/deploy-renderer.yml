name: Deploy Renderer Service

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  SERVICE_NAME: qwintly-preview-renderer
  IMAGE_NAME: qwintly-preview-renderer

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY_QWINTLY_GIT }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: '${{ vars.GCP_PROJECT_ID_QWINTLY }}'

      - name: Configure Docker
        run: |
          gcloud auth configure-docker ${{ vars.REGION }}-docker.pkg.dev

      - name: Build and Push Image
        run: |
          IMAGE=${{ vars.REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID_QWINTLY }}/qwintly-images/${{ env.IMAGE_NAME }}:${{ github.sha }}

          gcloud builds submit \
            --tag $IMAGE \
            .

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image $IMAGE \
            --region asia-south1 \
            --platform managed \
            --service-account ${{ vars.PREVIEW_RENDERER_SA_EMAIL }} \
            --set-env-vars GCP_PROJECT_ID_QWINTLY=${{ vars.GCP_PROJECT_ID_QWINTLY }},NEXT_PUBLIC_SUPABASE_URL=${{ vars.NEXT_PUBLIC_SUPABASE_URL }},NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ vars.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }} \
            --min-instances 0 \
            --max-instances 10 \
            --concurrency 1 \
            --timeout 3600 \
            --cpu 1 \
            --memory 1Gi
